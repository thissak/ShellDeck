name: ShellDeck
options:
  bundleIdPrefix: com.shelldeck
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

packages:
  Citadel:
    url: https://github.com/orlandos-nl/Citadel.git
    from: "0.12.0"
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: "1.2.0"
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess.git
    from: "4.2.2"

targets:
  ShellDeck:
    type: application
    platform: iOS
    sources:
      - path: ShellDeck
    dependencies:
      - package: Citadel
      - package: SwiftTerm
      - package: KeychainAccess
      - framework: Frameworks/mosh.xcframework
        embed: true
      - framework: Frameworks/Protobuf_C_.xcframework
        embed: true
      - sdk: libz.tbd
      - sdk: libc++.tbd
      - sdk: libresolv.tbd
    settings:
      SWIFT_VERSION: "5"
      PRODUCT_BUNDLE_IDENTIFIER: com.shelldeck.app
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: "1"
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      GENERATE_INFOPLIST_FILE: true
      INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
      INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
      INFOPLIST_KEY_UILaunchScreen_Generation: true
      INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
      INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
      SWIFT_OBJC_BRIDGING_HEADER: ShellDeck/BridgingHeader.h

  ShellDeckTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ShellDeckTests
    dependencies:
      - target: ShellDeck
    settings:
      SWIFT_VERSION: "5"
